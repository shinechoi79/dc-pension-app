<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DC 퇴직연금 관리</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ════════════════════════════════════════════════════════════════
//  순수 SVG 차트 컴포넌트 (외부 라이브러리 의존성 없음)
// ════════════════════════════════════════════════════════════════

// 영역 그래프 (대시보드 평가액 추이, 배당금 추이)
function SimpleAreaChart({ data, dataKey, color, height = 140, formatY, t }) {
  const W = 320, H = height, PAD = 28;
  const values = data.map(d => Number(d[dataKey]) || 0);
  const max = Math.max(...values, 1);
  const min = Math.min(...values, 0);
  const range = max - min || 1;
  const stepX = (W - PAD * 2) / Math.max(data.length - 1, 1);

  const points = data.map((d, i) => {
    const x = PAD + i * stepX;
    const y = H - PAD - ((Number(d[dataKey]) - min) / range) * (H - PAD * 2);
    return [x, y];
  });

  const linePath = points.map((p, i) => `${i === 0 ? "M" : "L"}${p[0]},${p[1]}`).join(" ");
  const areaPath = `${linePath} L${points[points.length - 1][0]},${H - PAD} L${points[0][0]},${H - PAD} Z`;

  const [hover, setHover] = useState(null);
  const gradId = "grad_" + dataKey + "_" + Math.random().toString(36).slice(2, 7);

  return (
    <div style={{ position: "relative" }}>
      <svg viewBox={`0 0 ${W} ${H}`} width="100%" height={H} style={{ overflow: "visible" }}>
        <defs>
          <linearGradient id={gradId} x1="0" y1="0" x2="0" y2="1">
            <stop offset="5%" stopColor={color} stopOpacity={0.35} />
            <stop offset="95%" stopColor={color} stopOpacity={0} />
          </linearGradient>
        </defs>
        {/* 가로 그리드 라인 3개 */}
        {[0.25, 0.5, 0.75].map((f, i) => (
          <line key={i} x1={PAD} x2={W - PAD} y1={PAD + f * (H - PAD * 2)} y2={PAD + f * (H - PAD * 2)} stroke={t.border} strokeDasharray="3 3" strokeWidth="1" />
        ))}
        <path d={areaPath} fill={`url(#${gradId})`} />
        <path d={linePath} fill="none" stroke={color} strokeWidth="2" />
        {points.map((p, i) => (
          <circle key={i} cx={p[0]} cy={p[1]} r={hover === i ? 4 : 0}
            fill={color} stroke={t.bg} strokeWidth="1.5"
            onMouseEnter={() => setHover(i)} onMouseLeave={() => setHover(null)}
            style={{ cursor: "pointer" }} />
        ))}
        {points.map((p, i) => (
          <rect key={"hit" + i} x={p[0] - stepX / 2} y={PAD} width={stepX} height={H - PAD * 2}
            fill="transparent"
            onMouseEnter={() => setHover(i)} onMouseLeave={() => setHover(null)} />
        ))}
        {data.map((d, i) => (
          <text key={i} x={points[i][0]} y={H - 8} fontSize="9" fill={t.textFaint} textAnchor="middle">
            {d.month || d.label}
          </text>
        ))}
      </svg>
      {hover !== null && (
        <div style={{
          position: "absolute", left: `${(points[hover][0] / W) * 100}%`, top: 0,
          transform: "translateX(-50%)", background: t.bg, border: `1px solid ${t.border}`,
          borderRadius: 6, padding: "4px 8px", fontSize: 10, color: t.text, whiteSpace: "nowrap", pointerEvents: "none"
        }}>
          {formatY ? formatY(data[hover][dataKey]) : data[hover][dataKey]}
        </div>
      )}
    </div>
  );
}

// 멀티 라인 그래프 (분할매수 회차별, 시뮬레이터 시나리오 비교)
function SimpleLineChart({ data, lines, height = 200, formatY, t, showLegend }) {
  const W = 320, H = height, PAD = 28;
  const allValues = data.flatMap(d => lines.map(l => Number(d[l.key]) || 0));
  const max = Math.max(...allValues, 1);
  const min = Math.min(...allValues, 0);
  const range = max - min || 1;
  const stepX = (W - PAD * 2) / Math.max(data.length - 1, 1);

  const [hover, setHover] = useState(null);

  const getPoints = (key) => data.map((d, i) => {
    const x = PAD + i * stepX;
    const y = H - PAD - ((Number(d[key]) - min) / range) * (H - PAD * 2);
    return [x, y];
  });

  return (
    <div>
      <div style={{ position: "relative" }}>
        <svg viewBox={`0 0 ${W} ${H}`} width="100%" height={H} style={{ overflow: "visible" }}>
          {[0.25, 0.5, 0.75].map((f, i) => (
            <line key={i} x1={PAD} x2={W - PAD} y1={PAD + f * (H - PAD * 2)} y2={PAD + f * (H - PAD * 2)} stroke={t.border} strokeDasharray="3 3" strokeWidth="1" />
          ))}
          {lines.map((l, li) => {
            const pts = getPoints(l.key);
            const path = pts.map((p, i) => `${i === 0 ? "M" : "L"}${p[0]},${p[1]}`).join(" ");
            return (
              <g key={l.key}>
                <path d={path} fill="none" stroke={l.color} strokeWidth="2" strokeDasharray={l.dashed ? "4 4" : "0"} />
                {!l.dashed && pts.map((p, i) => (
                  <circle key={i} cx={p[0]} cy={p[1]} r={hover === i ? 3.5 : 2.5} fill={l.color} />
                ))}
              </g>
            );
          })}
          {data.map((d, i) => {
            const x = PAD + i * stepX;
            return <rect key={i} x={x - stepX / 2} y={0} width={stepX} height={H} fill="transparent"
              onMouseEnter={() => setHover(i)} onMouseLeave={() => setHover(null)} />;
          })}
          {data.map((d, i) => {
            if (data.length > 8 && i % 2 !== 0) return null;
            const x = PAD + i * stepX;
            return (
              <text key={i} x={x} y={H - 6} fontSize="8" fill={t.textFaint} textAnchor="middle">
                {d.round || d.year}
              </text>
            );
          })}
        </svg>
        {hover !== null && (
          <div style={{
            position: "absolute", left: `${(PAD + hover * stepX) / W * 100}%`, top: 0,
            transform: "translateX(-50%)", background: t.bg, border: `1px solid ${t.border}`,
            borderRadius: 6, padding: "6px 10px", fontSize: 10, color: t.text, whiteSpace: "nowrap", pointerEvents: "none", zIndex: 10
          }}>
            {lines.map(l => (
              <div key={l.key} style={{ color: l.color }}>
                {l.label}: {formatY ? formatY(data[hover][l.key]) : data[hover][l.key]}
              </div>
            ))}
          </div>
        )}
      </div>
      {showLegend && (
        <div style={{ display: "flex", gap: 12, justifyContent: "center", marginTop: 8, flexWrap: "wrap" }}>
          {lines.filter(l => !l.dashed).map(l => (
            <div key={l.key} style={{ display: "flex", alignItems: "center", gap: 4 }}>
              <div style={{ width: 8, height: 8, borderRadius: 2, background: l.color }} />
              <span style={{ fontSize: 10, color: t.textSub }}>{l.label}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// 도넛 파이 차트 (자산배분)
function SimpleDonut({ data, colors, size = 120 }) {
  const total = data.reduce((s, d) => s + d.value, 0) || 1;
  const r = size / 2;
  const innerR = r * 0.55;
  let cumAngle = -90;

  const arcs = data.map((d, i) => {
    const angle = (d.value / total) * 360;
    const startAngle = cumAngle;
    const endAngle = cumAngle + angle;
    cumAngle = endAngle;

    const toXY = (ang, radius) => {
      const rad = (ang * Math.PI) / 180;
      return [r + radius * Math.cos(rad), r + radius * Math.sin(rad)];
    };

    const [x1, y1] = toXY(startAngle, r);
    const [x2, y2] = toXY(endAngle, r);
    const [ix1, iy1] = toXY(endAngle, innerR);
    const [ix2, iy2] = toXY(startAngle, innerR);
    const largeArc = angle > 180 ? 1 : 0;

    const path = `M${x1},${y1} A${r},${r} 0 ${largeArc} 1 ${x2},${y2} L${ix1},${iy1} A${innerR},${innerR} 0 ${largeArc} 0 ${ix2},${iy2} Z`;
    return <path key={i} d={path} fill={colors[i % colors.length]} />;
  });

  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      {arcs}
    </svg>
  );
}


// ════════════════════════════════════════════════════════════════
//  설정
// ════════════════════════════════════════════════════════════════
const API_URL_KEY = "dc_api_url";
const DEFAULT_API_URL = "https://script.google.com/macros/s/AKfycbw6U-yGtzzjqkK0hvk0qlyxpn0Rz9n3yBmOcgH822-zvZsSgCmmpB5a7yymOBxLI7Fe/exec";
const THEME_KEY = "dc_theme";

// ════════════════════════════════════════════════════════════════
//  Sheets API 통신 레이어 (JSONP GET / no-cors POST)
// ════════════════════════════════════════════════════════════════
function jsonpGet(url, action, params = {}) {
  return new Promise((resolve, reject) => {
    const cbName = "__dc_cb_" + Date.now() + "_" + Math.random().toString(36).slice(2);
    const qs = new URLSearchParams({ action, callback: cbName, ...params }).toString();
    const script = document.createElement("script");
    script.src = `${url}?${qs}`;

    const cleanup = () => {
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
    };

    window[cbName] = (json) => {
      cleanup();
      if (json && json.success) resolve(json.data);
      else reject(new Error(json?.error || "알 수 없는 오류"));
    };
    script.onerror = () => { cleanup(); reject(new Error("스크립트 로드 실패 — URL 또는 배포 설정 확인")); };

    document.body.appendChild(script);
    setTimeout(() => {
      if (window[cbName]) { cleanup(); reject(new Error("요청 시간 초과 (10초)")); }
    }, 25000);
  });
}

async function postAction(url, action, data) {
  try {
    await fetch(url, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({ action, data }),
    });
    return true;
  } catch (e) {
    throw new Error("전송 실패: " + e.message);
  }
}

// ════════════════════════════════════════════════════════════════
//  유틸
// ════════════════════════════════════════════════════════════════
const fmt = (n) => new Intl.NumberFormat("ko-KR").format(Math.round(Number(n) || 0));
const fmtM = (n) => `${(Number(n || 0) / 10000).toFixed(0)}만`;
const pct = (n) => `${Number(n) >= 0 ? "+" : ""}${Number(n || 0).toFixed(2)}%`;
const today = () => new Date().toISOString().slice(0, 10);
const COLORS = ["#3B82F6", "#10B981", "#F59E0B", "#EF4444", "#8B5CF6", "#06B6D4", "#94A3B8"];

// ════════════════════════════════════════════════════════════════
//  테마
// ════════════════════════════════════════════════════════════════
function useTheme() {
  const [theme, setTheme] = useState(() => localStorage.getItem(THEME_KEY) || "dark");
  useEffect(() => { localStorage.setItem(THEME_KEY, theme); }, [theme]);
  const toggle = () => setTheme(t => t === "dark" ? "light" : "dark");
  return [theme, toggle];
}

const THEMES = {
  dark: {
    bg: "#0F172A", bgGradient: "linear-gradient(135deg, #1E3A5F 0%, #0F172A 100%)",
    card: "#1E293B", border: "#334155", text: "#F8FAFC", textMuted: "#64748B",
    textSub: "#94A3B8", textFaint: "#475569", inputBg: "#0F172A",
  },
  light: {
    bg: "#F1F5F9", bgGradient: "linear-gradient(135deg, #DBEAFE 0%, #F1F5F9 100%)",
    card: "#FFFFFF", border: "#E2E8F0", text: "#0F172A", textMuted: "#64748B",
    textSub: "#475569", textFaint: "#94A3B8", inputBg: "#F8FAFC",
  },
};

// ════════════════════════════════════════════════════════════════
//  탭 정의
// ════════════════════════════════════════════════════════════════
const TABS = [
  { id: "dashboard", label: "대시보드", icon: "📊" },
  { id: "portfolio", label: "포트폴리오", icon: "🗂" },
  { id: "dca", label: "분할매수", icon: "🔄" },
  { id: "contributions", label: "납입내역", icon: "💳" },
  { id: "dividends", label: "배당금", icon: "💰" },
  { id: "simulator", label: "시뮬레이터", icon: "🎯" },
];

// ════════════════════════════════════════════════════════════════
//  메인 앱
// ════════════════════════════════════════════════════════════════
function App() {
  const [theme, toggleTheme] = useTheme();
  const t = THEMES[theme];

  const [apiUrl, setApiUrl] = useState(() => localStorage.getItem(API_URL_KEY) || DEFAULT_API_URL);
  const [showSetup, setShowSetup] = useState(false);
  const [tab, setTab] = useState("dashboard");

  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [toast, setToast] = useState(null);

  const showToast = useCallback((msg, type = "success") => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 2500);
  }, []);

  // ── 전체 데이터 로딩 ──────────────────────────────────────────
  const loadAll = useCallback(async () => {
    if (!apiUrl) return;
    setLoading(true);
    setError(null);
    try {
      const all = await jsonpGet(apiUrl, "all");
      setData(all);
    } catch (e) {
      setError(e.message);
    }
    setLoading(false);
  }, [apiUrl]);

  useEffect(() => { if (apiUrl) loadAll(); }, [apiUrl, loadAll]);

  const saveApiUrl = (url) => {
    localStorage.setItem(API_URL_KEY, url);
    setApiUrl(url);
    setShowSetup(false);
  };

  // ── 공통 액션 실행기 (POST 후 재로딩) ────────────────────────
  const runAction = useCallback(async (action, payload, successMsg) => {
    try {
      await postAction(apiUrl, action, payload);
      showToast(successMsg || "저장되었습니다");
      // Apps Script 반영 시간을 살짝 기다린 후 재조회
      await new Promise(r => setTimeout(r, 800));
      await loadAll();
      return true;
    } catch (e) {
      showToast(e.message, "error");
      return false;
    }
  }, [apiUrl, loadAll, showToast]);

  // ── 초기 설정 화면 ────────────────────────────────────────────
  if (showSetup || !apiUrl) {
    return <SetupScreen theme={t} onSave={saveApiUrl} initial={apiUrl} />;
  }

  // 보유 종목(머니파킹/현금 제외)과 전체 계산
  const portfolio = data?.portfolio || [];
  const realProducts = portfolio.filter(p => p.is_parking !== true && p.is_parking !== "TRUE");
  const totalValue = portfolio.reduce((s, p) => s + (Number(p.eval_amount) || 0), 0);
  const totalCost = portfolio.reduce((s, p) => s + (Number(p.purchase_cost) || 0), 0);

  return (
    <div style={{ fontFamily: "'Pretendard', 'Apple SD Gothic Neo', sans-serif", background: t.bg, minHeight: "100vh", color: t.text, maxWidth: 480, margin: "0 auto", position: "relative", paddingBottom: 80, transition: "background 0.3s, color 0.3s" }}>

      {/* 헤더 */}
      <div style={{ background: t.bgGradient, padding: "20px 20px 16px", borderBottom: `1px solid ${t.border}` }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
          <div>
            <div style={{ fontSize: 11, color: t.textMuted, letterSpacing: 2, textTransform: "uppercase", marginBottom: 4 }}>DC 퇴직연금</div>
            <div style={{ fontSize: 26, fontWeight: 800, background: "linear-gradient(90deg, #60A5FA, #34D399)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>
              ₩{fmt(totalValue)}
            </div>
          </div>
          <div style={{ display: "flex", gap: 6 }}>
            <button onClick={toggleTheme} style={iconBtnStyle(t)}>{theme === "dark" ? "☀️" : "🌙"}</button>
            <button onClick={loadAll} style={iconBtnStyle(t)} disabled={loading}>{loading ? "⏳" : "🔄"}</button>
            <button onClick={() => setShowSetup(true)} style={iconBtnStyle(t)}>⚙️</button>
          </div>
        </div>
        <div style={{ display: "flex", gap: 12, marginTop: 6 }}>
          <span style={{ fontSize: 12, color: (totalValue - totalCost) >= 0 ? "#34D399" : "#F87171" }}>
            {(totalValue - totalCost) >= 0 ? "▲" : "▼"} ₩{fmt(Math.abs(totalValue - totalCost))} ({pct(totalCost > 0 ? ((totalValue - totalCost) / totalCost) * 100 : 0)})
          </span>
          <span style={{ fontSize: 12, color: t.textFaint }}>총 매입 ₩{fmt(totalCost)}</span>
        </div>
      </div>

      {/* 에러 배너 */}
      {error && (
        <div style={{ margin: 16, padding: "12px 14px", background: "#450A0A", borderRadius: 10, fontSize: 12, color: "#F87171" }}>
          ⚠️ 데이터 로딩 실패: {error}
          <button onClick={loadAll} style={{ ...btnStyle("#7F1D1D"), marginLeft: 10, padding: "4px 10px" }}>재시도</button>
        </div>
      )}

      {/* 로딩 */}
      {loading && !data && (
        <div style={{ padding: 60, textAlign: "center", color: t.textMuted, fontSize: 13 }}>
          ⏳ Google Sheets에서 데이터 불러오는 중...
        </div>
      )}

      {/* 탭 콘텐츠 */}
      {data && (
        <div style={{ padding: "0 0 20px" }}>
          {tab === "dashboard" && <Dashboard t={t} data={data} totalValue={totalValue} totalCost={totalCost} />}
          {tab === "portfolio" && <Portfolio t={t} data={data} totalValue={totalValue} apiUrl={apiUrl} runAction={runAction} />}
          {tab === "dca" && <DCA t={t} data={data} apiUrl={apiUrl} runAction={runAction} />}
          {tab === "contributions" && <Contributions t={t} data={data} apiUrl={apiUrl} runAction={runAction} />}
          {tab === "dividends" && <Dividends t={t} data={data} apiUrl={apiUrl} runAction={runAction} />}
          {tab === "simulator" && <Simulator t={t} data={data} totalValue={totalValue} apiUrl={apiUrl} runAction={runAction} showToast={showToast} />}
        </div>
      )}

      {/* 토스트 */}
      {toast && (
        <div style={{
          position: "fixed", bottom: 90, left: "50%", transform: "translateX(-50%)",
          background: toast.type === "error" ? "#450A0A" : "#064E3B",
          color: toast.type === "error" ? "#F87171" : "#34D399",
          padding: "10px 18px", borderRadius: 10, fontSize: 12, fontWeight: 600,
          zIndex: 100, maxWidth: 400, textAlign: "center", boxShadow: "0 4px 12px rgba(0,0,0,0.3)"
        }}>
          {toast.msg}
        </div>
      )}

      {/* 하단 탭 바 */}
      <div style={{ position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 480, background: t.bg, borderTop: `1px solid ${t.border}`, display: "flex" }}>
        {TABS.map(tb => (
          <button key={tb.id} onClick={() => setTab(tb.id)}
            style={{ flex: 1, padding: "10px 0 8px", background: "none", border: "none", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 2 }}>
            <span style={{ fontSize: 18 }}>{tb.icon}</span>
            <span style={{ fontSize: 9, color: tab === tb.id ? "#60A5FA" : t.textFaint, fontWeight: tab === tb.id ? 700 : 400 }}>{tb.label}</span>
            {tab === tb.id && <div style={{ width: 20, height: 2, background: "#60A5FA", borderRadius: 1 }} />}
          </button>
        ))}
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════════
//  초기 설정 화면
// ════════════════════════════════════════════════════════════════
function SetupScreen({ theme: t, onSave, initial }) {
  const [url, setUrl] = useState(initial || "");
  const [testing, setTesting] = useState(false);
  const [testResult, setTestResult] = useState(null);

  const test = async () => {
    if (!url.trim()) return;
    setTesting(true);
    setTestResult(null);
    try {
      await jsonpGet(url.trim(), "summary");
      setTestResult({ ok: true, msg: "연동 성공! 저장하고 시작할 수 있어요." });
    } catch (e) {
      setTestResult({ ok: false, msg: e.message });
    }
    setTesting(false);
  };

  return (
    <div style={{ fontFamily: "'Pretendard','Apple SD Gothic Neo',sans-serif", background: t.bg, minHeight: "100vh", color: t.text, maxWidth: 480, margin: "0 auto", padding: 24 }}>
      <div style={{ marginTop: 40, marginBottom: 24 }}>
        <div style={{ fontSize: 11, color: t.textMuted, letterSpacing: 2, marginBottom: 6 }}>DC 퇴직연금 관리</div>
        <div style={{ fontSize: 24, fontWeight: 800, background: "linear-gradient(90deg,#60A5FA,#34D399)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>
          초기 설정
        </div>
      </div>

      <div style={{ background: t.card, borderRadius: 12, padding: 16, marginBottom: 14, border: `1px solid ${t.border}` }}>
        <label style={{ fontSize: 11, color: t.textMuted, display: "block", marginBottom: 6 }}>Apps Script 웹앱 URL</label>
        <input
          value={url}
          onChange={e => setUrl(e.target.value)}
          placeholder="https://script.google.com/macros/s/..."
          style={{ width: "100%", background: t.inputBg, border: `1px solid ${t.border}`, borderRadius: 8, padding: "10px 12px", color: t.text, fontSize: 12, outline: "none", boxSizing: "border-box" }}
        />
      </div>

      {testResult && (
        <div style={{ padding: "10px 14px", borderRadius: 8, marginBottom: 14, fontSize: 12, background: testResult.ok ? "#064E3B" : "#450A0A", color: testResult.ok ? "#34D399" : "#F87171" }}>
          {testResult.ok ? "✅" : "❌"} {testResult.msg}
        </div>
      )}

      <div style={{ display: "flex", gap: 8 }}>
        <button onClick={test} disabled={testing || !url.trim()} style={btnStyle("#3B82F6")}>
          {testing ? "테스트 중..." : "연결 테스트"}
        </button>
        <button onClick={() => onSave(url.trim())} disabled={!url.trim()} style={btnStyle("#10B981")}>
          저장하고 시작
        </button>
      </div>

      <div style={{ marginTop: 20, padding: 14, background: t.card, borderRadius: 12, border: `1px solid ${t.border}` }}>
        <div style={{ fontSize: 11, color: "#60A5FA", fontWeight: 700, marginBottom: 8 }}>💡 URL 찾는 방법</div>
        <div style={{ fontSize: 11, color: t.textSub, lineHeight: 1.7 }}>
          Google Sheets → 확장 프로그램 → Apps Script → 배포 → 배포 관리에서<br />
          웹 앱 URL을 복사해서 붙여넣으세요.
        </div>
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════════
//  대시보드
// ════════════════════════════════════════════════════════════════
function Dashboard({ t, data, totalValue, totalCost }) {
  const { summary, portfolio, config } = data;
  const totalReturn = totalCost > 0 ? ((totalValue - totalCost) / totalCost) * 100 : 0;
  const totalDividend = Number(summary.total_dividend) || 0;
  const dcaDone = Number(summary.dca_done) || 0;
  const dcaTotal = Number(summary.dca_total) || 12;

  const chartData = Array.from({ length: 7 }, (_, i) => {
    const m = i === 6 ? "현재" : `${i + 1}월`;
    const v = totalCost * (1 + (totalReturn / 100) * (i / 6));
    return { month: m, value: Math.round(v) };
  });
  if (chartData.length) chartData[6].value = totalValue;

  const pieData = portfolio.filter(p => Number(p.eval_amount) > 0).map(p => ({ name: p.name.slice(0, 8), value: Number(p.eval_amount) }));

  return (
    <div style={{ padding: "16px 16px 0" }}>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 16 }}>
        {[
          { label: "분할매수 진행", value: `${dcaDone}/${dcaTotal}회`, sub: "6개월 12회", color: "#60A5FA" },
          { label: "배당금 수령", value: `₩${fmtM(totalDividend)}`, sub: "누적", color: "#34D399" },
          { label: "총 납입원금", value: `₩${fmtM(totalCost)}`, sub: "매입기준", color: "#F59E0B" },
          { label: "평가수익", value: pct(totalReturn), sub: `₩${fmtM(totalValue - totalCost)}`, color: totalReturn >= 0 ? "#34D399" : "#F87171" },
        ].map((c, i) => (
          <div key={i} style={{ background: t.card, borderRadius: 12, padding: "14px 14px", border: `1px solid ${t.border}` }}>
            <div style={{ fontSize: 10, color: t.textMuted, marginBottom: 4 }}>{c.label}</div>
            <div style={{ fontSize: 18, fontWeight: 800, color: c.color }}>{c.value}</div>
            <div style={{ fontSize: 10, color: t.textFaint, marginTop: 2 }}>{c.sub}</div>
          </div>
        ))}
      </div>

      <div style={{ background: t.card, borderRadius: 12, padding: 16, marginBottom: 12, border: `1px solid ${t.border}` }}>
        <div style={{ fontSize: 12, color: t.textSub, marginBottom: 12, fontWeight: 600 }}>평가액 추이</div>
        <SimpleAreaChart data={chartData} dataKey="value" color="#3B82F6" height={140} formatY={v => `₩${fmt(v)}`} t={t} />
      </div>

      <div style={{ background: t.card, borderRadius: 12, padding: 16, border: `1px solid ${t.border}` }}>
        <div style={{ fontSize: 12, color: t.textSub, marginBottom: 12, fontWeight: 600 }}>자산배분</div>
        {pieData.length === 0 ? (
          <div style={{ fontSize: 11, color: t.textFaint, textAlign: "center", padding: 20 }}>아직 매수 내역이 없어요</div>
        ) : (
          <div style={{ display: "flex", alignItems: "center" }}>
            <SimpleDonut data={pieData} colors={COLORS} size={120} />
            <div style={{ flex: 1, paddingLeft: 12 }}>
              {pieData.map((p, i) => (
                <div key={i} style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                    <div style={{ width: 8, height: 8, borderRadius: 2, background: COLORS[i % COLORS.length] }} />
                    <span style={{ fontSize: 10, color: t.textSub }}>{p.name}</span>
                  </div>
                  <span style={{ fontSize: 10, color: "#60A5FA", fontWeight: 600 }}>
                    {((p.value / totalValue) * 100).toFixed(1)}%
                  </span>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════════
//  포트폴리오
// ════════════════════════════════════════════════════════════════
function Portfolio({ t, data, totalValue, apiUrl, runAction }) {
  const [editing, setEditing] = useState(null);
  const [form, setForm] = useState({ units: "", avg_cost: "" });
  const [saving, setSaving] = useState(false);

  const portfolio = data.portfolio || [];

  const openEdit = (p) => { setEditing(p.ticker); setForm({ units: p.units, avg_cost: p.avg_cost }); };

  const save = async (ticker) => {
    setSaving(true);
    const ok = await runAction("updateHoldings", { ticker, units: form.units, avg_cost: form.avg_cost }, "보유현황 업데이트됨");
    setSaving(false);
    if (ok) setEditing(null);
  };

  return (
    <div style={{ padding: 16 }}>
      <div style={{ marginBottom: 14 }}>
        <span style={{ fontSize: 14, fontWeight: 700, color: t.text }}>보유 상품 ({portfolio.length})</span>
      </div>

      {portfolio.map((p, i) => {
        const isParking = p.is_parking === true || p.is_parking === "TRUE";
        const ret = Number(p.profit_rate) || 0;
        const actualRatio = (Number(p.actual_ratio) || 0) * 100;
        const targetRatio = (Number(p.target_ratio) || 0) * 100;
        const diff = actualRatio - targetRatio;
        const isEditing = editing === p.ticker;

        return (
          <div key={p.ticker} style={{ background: t.card, borderRadius: 12, padding: 14, marginBottom: 10, border: `1px solid ${isParking ? "#F59E0B40" : t.border}` }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
              <div>
                <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 2 }}>
                  <div style={{ width: 8, height: 8, borderRadius: 2, background: COLORS[i % COLORS.length] }} />
                  <span style={{ fontSize: 13, fontWeight: 700, color: t.text }}>{p.name}</span>
                  {isParking && <span style={{ fontSize: 9, color: "#F59E0B", background: "#451A0320", padding: "1px 6px", borderRadius: 4 }}>대기자산</span>}
                </div>
                <span style={{ fontSize: 10, color: t.textFaint }}>{p.ticker} · 현재가 ₩{fmt(p.current_price)}</span>
              </div>
              <button onClick={() => openEdit(p)} style={{ ...btnStyle(t.border), padding: "4px 8px", fontSize: 10, color: t.text }}>수정</button>
            </div>

            {isEditing && (
              <div style={{ marginTop: 10, padding: 10, background: t.inputBg, borderRadius: 8 }}>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 8 }}>
                  <div>
                    <div style={{ fontSize: 9, color: t.textMuted, marginBottom: 3 }}>보유 좌수</div>
                    <input type="number" value={form.units} onChange={e => setForm(f => ({ ...f, units: e.target.value }))} style={inputStyle(t)} />
                  </div>
                  <div>
                    <div style={{ fontSize: 9, color: t.textMuted, marginBottom: 3 }}>평균 매입단가</div>
                    <input type="number" value={form.avg_cost} onChange={e => setForm(f => ({ ...f, avg_cost: e.target.value }))} style={inputStyle(t)} />
                  </div>
                </div>
                <div style={{ display: "flex", gap: 8 }}>
                  <button onClick={() => save(p.ticker)} disabled={saving} style={btnStyle("#10B981")}>{saving ? "저장 중..." : "저장"}</button>
                  <button onClick={() => setEditing(null)} style={btnStyle("#475569")}>취소</button>
                </div>
              </div>
            )}

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginTop: 12 }}>
              <Stat t={t} label="평가액" value={`₩${fmtM(p.eval_amount)}`} />
              <Stat t={t} label="수익률" value={pct(ret)} color={ret >= 0 ? "#34D399" : "#F87171"} />
              <Stat t={t} label="현재/목표" value={`${actualRatio.toFixed(1)}% / ${targetRatio.toFixed(0)}%`} color={Math.abs(diff) > 5 && !isParking ? "#F59E0B" : t.textSub} />
            </div>
            {Math.abs(diff) > 5 && !isParking && (
              <div style={{ marginTop: 8, fontSize: 10, color: "#F59E0B", background: "#451A0320", borderRadius: 6, padding: "4px 8px" }}>
                ⚠ 목표 비중 대비 {diff > 0 ? "+" : ""}{diff.toFixed(1)}%p — 리밸런싱 권장
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ════════════════════════════════════════════════════════════════
//  분할매수
// ════════════════════════════════════════════════════════════════
function DCA({ t, data, apiUrl, runAction }) {
  const [adding, setAdding] = useState(false);
  const [saving, setSaving] = useState(false);
  const [form, setForm] = useState({ date: today(), ticker: "", name: "", amount: "", unit_price: "", memo: "" });

  const dca = data.dca || [];
  const summary = data.summary || {};
  const totalDCA = Number(summary.dca_total) || 12;
  const done = dca.length;
  const remaining = totalDCA - done;
  const perRound = Number(summary.dca_per_round_amount) || 0;
  const usedAmount = Number(summary.dca_used_amount) || 0;
  const totalAmount = Number(summary.dca_total) ? (perRound * totalDCA) : 0;

  const realProducts = (data.portfolio || []).filter(p => p.is_parking !== true && p.is_parking !== "TRUE");

  // ── 이번 회차 플래너 계산 ──────────────────────────────────────
  const currentRound = done + 1; // 다음에 진행해야 할 회차
  const thisRoundRecords = dca.filter(d => Number(d.round) === currentRound);

  const plannerRows = realProducts.map(p => {
    const targetRatio = Number(p.target_ratio) || 0;
    const targetAmount = perRound * targetRatio;           // 이번 회차 종목별 목표 매수금액
    const currentPrice = Number(p.current_price) || 0;
    const recommendedUnits = currentPrice > 0 ? Math.floor(targetAmount / currentPrice) : 0;
    const recommendedCost = recommendedUnits * currentPrice; // 정수 주수 기준 실제 소요금액
    const leftover = targetAmount - recommendedCost;          // 단주 자투리

    const record = thisRoundRecords.find(d => d.ticker === p.ticker);
    const isDone = !!record;

    return {
      ticker: p.ticker, name: p.name, targetRatio, targetAmount,
      currentPrice, recommendedUnits, recommendedCost, leftover,
      isDone, actualAmount: record ? Number(record.amount) : 0,
    };
  });

  const plannerDoneCount = plannerRows.filter(r => r.isDone).length;
  const plannerTotalRecommended = plannerRows.reduce((s, r) => s + r.recommendedCost, 0);
  const plannerTotalLeftover = plannerRows.reduce((s, r) => s + r.leftover, 0);

  // ── 기여금 매수 가이드 계산 ──────────────────────────────────────
  const companyContributions = (data.contribution || [])
    .filter(c => c.type === "회사부담금")
    .sort((a, b) => String(b.date).localeCompare(String(a.date))); // 최신순

  const [selectedContribIdx, setSelectedContribIdx] = useState(0);
  const selectedContrib = companyContributions[selectedContribIdx];

  const contribGuideRows = selectedContrib ? realProducts.map(p => {
    const targetRatio = Number(p.target_ratio) || 0;
    const targetAmount = Number(selectedContrib.amount) * targetRatio;
    const currentPrice = Number(p.current_price) || 0;
    const recommendedUnits = currentPrice > 0 ? Math.floor(targetAmount / currentPrice) : 0;
    const recommendedCost = recommendedUnits * currentPrice;
    const leftover = targetAmount - recommendedCost;
    return { ticker: p.ticker, name: p.name, targetRatio, targetAmount, currentPrice, recommendedUnits, recommendedCost, leftover };
  }) : [];

  const contribTotalRecommended = contribGuideRows.reduce((s, r) => s + r.recommendedCost, 0);
  const contribTotalLeftover = contribGuideRows.reduce((s, r) => s + r.leftover, 0);

  const selectProduct = (ticker) => {
    const p = realProducts.find(x => x.ticker === ticker);
    setForm(f => ({ ...f, ticker, name: p?.name || "", unit_price: p?.current_price || "" }));
  };

  const add = async () => {
    if (!form.ticker || !form.amount) return;
    setSaving(true);
    const ok = await runAction("addDca", form, `${done + 1}회차 매수 기록 추가됨`);
    setSaving(false);
    if (ok) { setAdding(false); setForm({ date: today(), ticker: "", name: "", amount: "", unit_price: "", memo: "" }); }
  };

  const del = async (row) => {
    await runAction("deleteRow", { sheetName: "DC_DCA", row }, "삭제되었습니다");
  };

  const barData = Array.from({ length: totalDCA }, (_, i) => ({
    round: `${i + 1}`,
    done: dca.find(d => Number(d.round) === i + 1) ? Number(dca.find(d => Number(d.round) === i + 1).amount) : 0,
    plan: perRound,
  }));

  return (
    <div style={{ padding: 16 }}>
      <div style={{ background: t.card, borderRadius: 12, padding: 14, marginBottom: 14, border: `1px solid ${t.border}` }}>
        <div style={{ fontSize: 12, color: t.textSub, fontWeight: 600, marginBottom: 10 }}>6개월 {totalDCA}회 분할매수 현황</div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 12 }}>
          <Stat t={t} label="완료" value={`${done}회`} color="#34D399" />
          <Stat t={t} label="잔여" value={`${remaining}회`} color="#F59E0B" />
          <Stat t={t} label="1회당" value={`₩${fmtM(perRound)}`} />
        </div>
        <div style={{ height: 8, background: t.inputBg, borderRadius: 4, overflow: "hidden" }}>
          <div style={{ height: "100%", width: `${(done / totalDCA) * 100}%`, background: "linear-gradient(90deg, #3B82F6, #34D399)", borderRadius: 4, transition: "width 0.5s" }} />
        </div>
        <div style={{ display: "flex", justifyContent: "space-between", marginTop: 4 }}>
          <span style={{ fontSize: 10, color: t.textFaint }}>집행 ₩{fmt(usedAmount)}</span>
        </div>
      </div>

      {/* ── 이번 회차 플래너 ────────────────────────────────────── */}
      {remaining > 0 && (
        <div style={{ background: t.card, borderRadius: 12, padding: 14, marginBottom: 14, border: "1px solid #3B82F640" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
            <span style={{ fontSize: 13, fontWeight: 700, color: "#60A5FA" }}>🎯 {currentRound}회차 매수 플래너</span>
            <span style={{ fontSize: 11, color: t.textMuted }}>{plannerDoneCount}/{plannerRows.length}종목 완료</span>
          </div>
          <div style={{ fontSize: 10, color: t.textFaint, marginBottom: 10 }}>
            머니마켓 ETF 매도 재원 기준 · 현재가로 계산된 추천 수량입니다
          </div>

          {plannerRows.map((r, i) => (
            <div key={r.ticker} style={{
              background: t.inputBg, borderRadius: 8, padding: 10, marginBottom: 8,
              border: r.isDone ? "1px solid #34D39940" : `1px solid ${t.border}`,
              opacity: r.isDone ? 0.7 : 1,
            }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                  <div style={{ width: 8, height: 8, borderRadius: 2, background: COLORS[i % COLORS.length] }} />
                  <span style={{ fontSize: 12, fontWeight: 600, color: t.text }}>{r.name}</span>
                  {r.isDone && <span style={{ fontSize: 9, color: "#34D399" }}>✓ 완료</span>}
                </div>
                <span style={{ fontSize: 10, color: t.textFaint }}>목표 {(r.targetRatio * 100).toFixed(0)}%</span>
              </div>

              {r.isDone ? (
                <div style={{ fontSize: 11, color: t.textSub, marginTop: 6 }}>
                  실제 매수 ₩{fmt(r.actualAmount)}
                </div>
              ) : (
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 6, marginTop: 8 }}>
                  <Stat t={t} label="목표금액" value={`₩${fmtM(r.targetAmount)}`} />
                  <Stat t={t} label="현재가" value={`₩${fmt(r.currentPrice)}`} />
                  <Stat t={t} label="추천수량" value={`${r.recommendedUnits}주`} color="#60A5FA" />
                </div>
              )}
            </div>
          ))}

          <div style={{ marginTop: 4, padding: "8px 10px", background: t.inputBg, borderRadius: 8, fontSize: 10, color: t.textSub, lineHeight: 1.6 }}>
            추천 수량 합계 매수금액 <span style={{ color: t.text, fontWeight: 700 }}>₩{fmt(plannerTotalRecommended)}</span>
            {plannerTotalLeftover > 0 && (
              <> · 단주 자투리(현금 잔류 예상) <span style={{ color: "#F59E0B", fontWeight: 700 }}>₩{fmt(plannerTotalLeftover)}</span></>
            )}
          </div>
        </div>
      )}

      {remaining === 0 && (
        <div style={{ background: "#064E3B", borderRadius: 12, padding: 14, marginBottom: 14, textAlign: "center" }}>
          <span style={{ fontSize: 12, color: "#34D399", fontWeight: 700 }}>🎉 12회 분할매수 전부 완료되었습니다!</span>
        </div>
      )}

      {/* ── 회사 기여금 매수 가이드 ──────────────────────────────── */}
      {companyContributions.length > 0 && (
        <div style={{ background: t.card, borderRadius: 12, padding: 14, marginBottom: 14, border: "1px solid #10B98140" }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: "#34D399", marginBottom: 4 }}>💼 회사 기여금 매수 가이드</div>
          <div style={{ fontSize: 10, color: t.textFaint, marginBottom: 10 }}>
            선택한 입금액을 목표 비중대로 나누어 추천 수량을 계산합니다
          </div>

          <div style={{ marginBottom: 10 }}>
            <select
              value={selectedContribIdx}
              onChange={e => setSelectedContribIdx(Number(e.target.value))}
              style={inputStyle(t)}
            >
              {companyContributions.map((c, i) => (
                <option key={i} value={i}>{c.date} · ₩{fmt(c.amount)} {c.memo ? `(${c.memo})` : ""}</option>
              ))}
            </select>
          </div>

          {contribGuideRows.map((r, i) => (
            <div key={r.ticker} style={{ background: t.inputBg, borderRadius: 8, padding: 10, marginBottom: 8, border: `1px solid ${t.border}` }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                  <div style={{ width: 8, height: 8, borderRadius: 2, background: COLORS[i % COLORS.length] }} />
                  <span style={{ fontSize: 12, fontWeight: 600, color: t.text }}>{r.name}</span>
                </div>
                <span style={{ fontSize: 10, color: t.textFaint }}>목표 {(r.targetRatio * 100).toFixed(0)}%</span>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 6, marginTop: 8 }}>
                <Stat t={t} label="배분금액" value={`₩${fmtM(r.targetAmount)}`} />
                <Stat t={t} label="현재가" value={`₩${fmt(r.currentPrice)}`} />
                <Stat t={t} label="추천수량" value={`${r.recommendedUnits}주`} color="#34D399" />
              </div>
            </div>
          ))}

          <div style={{ marginTop: 4, padding: "8px 10px", background: t.inputBg, borderRadius: 8, fontSize: 10, color: t.textSub, lineHeight: 1.6 }}>
            추천 수량 합계 매수금액 <span style={{ color: t.text, fontWeight: 700 }}>₩{fmt(contribTotalRecommended)}</span>
            {contribTotalLeftover > 0 && (
              <> · 단주 자투리 <span style={{ color: "#F59E0B", fontWeight: 700 }}>₩{fmt(contribTotalLeftover)}</span></>
            )}
          </div>
        </div>
      )}

      <div style={{ background: t.card, borderRadius: 12, padding: 14, marginBottom: 14, border: `1px solid ${t.border}` }}>
        <div style={{ fontSize: 12, color: t.textSub, fontWeight: 600, marginBottom: 8 }}>회차별 집행 현황</div>
        <SimpleLineChart
          data={barData}
          lines={[
            { key: "done", label: "집행", color: "#3B82F6" },
            { key: "plan", label: "계획", color: t.border, dashed: true },
          ]}
          height={100}
          formatY={v => v > 0 ? `₩${fmt(v)}` : "미집행"}
          t={t}
        />
      </div>

      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
        <span style={{ fontSize: 13, fontWeight: 700, color: t.text }}>매수 내역</span>
        <button onClick={() => setAdding(true)} style={btnStyle("#3B82F6")}>+ 매수 기록</button>
      </div>

      {adding && (
        <div style={{ background: t.card, borderRadius: 12, padding: 14, marginBottom: 12, border: "1px solid #3B82F6" }}>
          <div style={{ fontSize: 12, color: "#60A5FA", fontWeight: 700, marginBottom: 10 }}>{done + 1}회차 매수 기록</div>

          <div style={{ marginBottom: 8 }}>
            <div style={{ fontSize: 10, color: t.textMuted, marginBottom: 3 }}>종목 선택</div>
            <select value={form.ticker} onChange={e => selectProduct(e.target.value)} style={inputStyle(t)}>
              <option value="">선택하세요</option>
              {realProducts.map(p => <option key={p.ticker} value={p.ticker}>{p.name}</option>)}
            </select>
          </div>
          {[
            { label: "날짜", key: "date", type: "date" },
            { label: "매수금액 (원)", key: "amount", type: "number" },
            { label: "매수단가 (원)", key: "unit_price", type: "number" },
            { label: "메모", key: "memo", type: "text" },
          ].map(f => (
            <div key={f.key} style={{ marginBottom: 8 }}>
              <div style={{ fontSize: 10, color: t.textMuted, marginBottom: 3 }}>{f.label}</div>
              <input type={f.type} value={form[f.key]} onChange={e => setForm(p => ({ ...p, [f.key]: e.target.value }))} style={inputStyle(t)} />
            </div>
          ))}
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={add} disabled={saving} style={btnStyle("#10B981")}>{saving ? "저장 중..." : "저장"}</button>
            <button onClick={() => setAdding(false)} style={btnStyle("#475569")}>취소</button>
          </div>
        </div>
      )}

      {[...dca].sort((a, b) => Number(b.round) - Number(a.round)).map(d => (
        <div key={d._row} style={{ background: t.card, borderRadius: 10, padding: 12, marginBottom: 8, border: `1px solid ${t.border}` }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div>
              <div style={{ fontSize: 11, color: "#60A5FA", fontWeight: 700 }}>{d.round}회차 · {d.date}</div>
              <div style={{ fontSize: 12, fontWeight: 600, marginTop: 2, color: t.text }}>{d.name}</div>
            </div>
            <div style={{ textAlign: "right" }}>
              <div style={{ fontSize: 14, fontWeight: 800, color: t.text }}>₩{fmt(d.amount)}</div>
              {d.unit_price > 0 && <div style={{ fontSize: 10, color: t.textFaint }}>{fmt(d.unit_price)}원 × {Number(d.units).toFixed(2)}좌</div>}
            </div>
          </div>
          <button onClick={() => del(d._row)} style={{ ...btnStyle("#7F1D1D"), padding: "3px 8px", fontSize: 9, marginTop: 8 }}>삭제</button>
        </div>
      ))}
    </div>
  );
}

// ════════════════════════════════════════════════════════════════
//  납입내역
// ════════════════════════════════════════════════════════════════
function Contributions({ t, data, apiUrl, runAction }) {
  const [adding, setAdding] = useState(false);
  const [saving, setSaving] = useState(false);
  const [form, setForm] = useState({ date: today(), type: "회사부담금", amount: "", memo: "" });

  const contributions = data.contribution || [];
  const company = contributions.filter(c => c.type === "회사부담금").reduce((s, c) => s + Number(c.amount), 0);
  const personal = contributions.filter(c => c.type === "추가납입").reduce((s, c) => s + Number(c.amount), 0);

  const add = async () => {
    if (!form.amount) return;
    setSaving(true);
    const ok = await runAction("addContribution", form, "납입 기록 추가됨");
    setSaving(false);
    if (ok) { setAdding(false); setForm({ date: today(), type: "회사부담금", amount: "", memo: "" }); }
  };

  const del = async (row) => runAction("deleteRow", { sheetName: "DC_CONTRIBUTION", row }, "삭제되었습니다");

  return (
    <div style={{ padding: 16 }}>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 14 }}>
        <div style={{ background: t.card, borderRadius: 12, padding: 14, border: `1px solid ${t.border}` }}>
          <div style={{ fontSize: 10, color: t.textMuted }}>회사 부담금</div>
          <div style={{ fontSize: 18, fontWeight: 800, color: "#60A5FA", marginTop: 4 }}>₩{fmtM(company)}</div>
          <div style={{ fontSize: 10, color: t.textFaint, marginTop: 2 }}>연 1~2회 입금</div>
        </div>
        <div style={{ background: t.card, borderRadius: 12, padding: 14, border: `1px solid ${t.border}` }}>
          <div style={{ fontSize: 10, color: t.textMuted }}>추가납입</div>
          <div style={{ fontSize: 18, fontWeight: 800, color: "#34D399", marginTop: 4 }}>₩{fmtM(personal)}</div>
          <div style={{ fontSize: 10, color: t.textFaint, marginTop: 2 }}>자체 납입</div>
        </div>
      </div>

      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
        <span style={{ fontSize: 13, fontWeight: 700, color: t.text }}>납입 내역</span>
        <button onClick={() => setAdding(true)} style={btnStyle("#3B82F6")}>+ 납입 기록</button>
      </div>

      {adding && (
        <div style={{ background: t.card, borderRadius: 12, padding: 14, marginBottom: 12, border: "1px solid #3B82F6" }}>
          <div style={{ marginBottom: 8 }}>
            <div style={{ fontSize: 10, color: t.textMuted, marginBottom: 3 }}>구분</div>
            <select value={form.type} onChange={e => setForm(p => ({ ...p, type: e.target.value }))} style={inputStyle(t)}>
              <option>회사부담금</option>
              <option>추가납입</option>
            </select>
          </div>
          {[
            { label: "날짜", key: "date", type: "date" },
            { label: "금액 (원)", key: "amount", type: "number" },
            { label: "메모", key: "memo", type: "text" },
          ].map(f => (
            <div key={f.key} style={{ marginBottom: 8 }}>
              <div style={{ fontSize: 10, color: t.textMuted, marginBottom: 3 }}>{f.label}</div>
              <input type={f.type} value={form[f.key]} onChange={e => setForm(p => ({ ...p, [f.key]: e.target.value }))} style={inputStyle(t)} />
            </div>
          ))}
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={add} disabled={saving} style={btnStyle("#10B981")}>{saving ? "저장 중..." : "저장"}</button>
            <button onClick={() => setAdding(false)} style={btnStyle("#475569")}>취소</button>
          </div>
        </div>
      )}

      {[...contributions].sort((a, b) => String(b.date).localeCompare(String(a.date))).map(c => (
        <div key={c._row} style={{ background: t.card, borderRadius: 10, padding: 12, marginBottom: 8, border: `1px solid ${t.border}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div>
            <div style={{ fontSize: 10, color: c.type === "회사부담금" ? "#60A5FA" : "#34D399", fontWeight: 700 }}>{c.type}</div>
            <div style={{ fontSize: 11, color: t.textMuted, marginTop: 2 }}>{c.date} {c.memo && `· ${c.memo}`}</div>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ fontSize: 15, fontWeight: 800, color: t.text }}>₩{fmt(c.amount)}</span>
            <button onClick={() => del(c._row)} style={{ ...btnStyle("#7F1D1D"), padding: "3px 8px", fontSize: 9 }}>삭제</button>
          </div>
        </div>
      ))}
    </div>
  );
}

// ════════════════════════════════════════════════════════════════
//  배당금
// ════════════════════════════════════════════════════════════════
function Dividends({ t, data, apiUrl, runAction }) {
  const [adding, setAdding] = useState(false);
  const [saving, setSaving] = useState(false);
  const [form, setForm] = useState({ date: today(), ticker: "", name: "", amount: "", memo: "" });

  const dividends = data.dividend || [];
  const total = dividends.reduce((s, d) => s + Number(d.amount), 0);
  const realProducts = (data.portfolio || []).filter(p => p.is_parking !== true && p.is_parking !== "TRUE");

  const selectProduct = (ticker) => {
    const p = realProducts.find(x => x.ticker === ticker);
    setForm(f => ({ ...f, ticker, name: p?.name || "" }));
  };

  const add = async () => {
    if (!form.amount || !form.ticker) return;
    setSaving(true);
    const ok = await runAction("addDividend", form, "배당 기록 추가됨");
    setSaving(false);
    if (ok) { setAdding(false); setForm({ date: today(), ticker: "", name: "", amount: "", memo: "" }); }
  };

  const del = async (row) => runAction("deleteRow", { sheetName: "DC_DIVIDEND", row }, "삭제되었습니다");

  const byMonth = {};
  dividends.forEach(d => { const m = String(d.date).slice(0, 7); byMonth[m] = (byMonth[m] || 0) + Number(d.amount); });
  const chartData = Object.entries(byMonth).sort().map(([m, v]) => ({ month: m.slice(5) + "월", amount: v }));

  return (
    <div style={{ padding: 16 }}>
      <div style={{ background: "linear-gradient(135deg, #064E3B, #065F46)", borderRadius: 12, padding: 16, marginBottom: 14 }}>
        <div style={{ fontSize: 11, color: "#6EE7B7", marginBottom: 4 }}>누적 배당금 수령</div>
        <div style={{ fontSize: 28, fontWeight: 800, color: "#34D399" }}>₩{fmt(total)}</div>
        <div style={{ fontSize: 11, color: "#6EE7B7", marginTop: 4 }}>{dividends.length}건 수령</div>
      </div>

      {chartData.length > 0 && (
        <div style={{ background: t.card, borderRadius: 12, padding: 14, marginBottom: 14, border: `1px solid ${t.border}` }}>
          <div style={{ fontSize: 12, color: t.textSub, fontWeight: 600, marginBottom: 8 }}>월별 배당금</div>
          <SimpleAreaChart data={chartData} dataKey="amount" color="#10B981" height={100} formatY={v => `₩${fmt(v)}`} t={t} />
        </div>
      )}

      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
        <span style={{ fontSize: 13, fontWeight: 700, color: t.text }}>배당금 내역</span>
        <button onClick={() => setAdding(true)} style={btnStyle("#10B981")}>+ 배당 기록</button>
      </div>

      {adding && (
        <div style={{ background: t.card, borderRadius: 12, padding: 14, marginBottom: 12, border: "1px solid #10B981" }}>
          <div style={{ marginBottom: 8 }}>
            <div style={{ fontSize: 10, color: t.textMuted, marginBottom: 3 }}>종목 선택</div>
            <select value={form.ticker} onChange={e => selectProduct(e.target.value)} style={inputStyle(t)}>
              <option value="">선택하세요</option>
              {realProducts.map(p => <option key={p.ticker} value={p.ticker}>{p.name}</option>)}
            </select>
          </div>
          {[
            { label: "날짜", key: "date", type: "date" },
            { label: "배당금액 (원)", key: "amount", type: "number" },
            { label: "메모", key: "memo", type: "text" },
          ].map(f => (
            <div key={f.key} style={{ marginBottom: 8 }}>
              <div style={{ fontSize: 10, color: t.textMuted, marginBottom: 3 }}>{f.label}</div>
              <input type={f.type} value={form[f.key]} onChange={e => setForm(p => ({ ...p, [f.key]: e.target.value }))} style={inputStyle(t)} />
            </div>
          ))}
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={add} disabled={saving} style={btnStyle("#10B981")}>{saving ? "저장 중..." : "저장"}</button>
            <button onClick={() => setAdding(false)} style={btnStyle("#475569")}>취소</button>
          </div>
        </div>
      )}

      {[...dividends].sort((a, b) => String(b.date).localeCompare(String(a.date))).map(d => (
        <div key={d._row} style={{ background: t.card, borderRadius: 10, padding: 12, marginBottom: 8, border: `1px solid ${t.border}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div>
            <div style={{ fontSize: 12, fontWeight: 600, color: t.text }}>{d.name}</div>
            <div style={{ fontSize: 10, color: t.textMuted, marginTop: 2 }}>{d.date} {d.memo && `· ${d.memo}`}</div>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ fontSize: 15, fontWeight: 800, color: "#34D399" }}>+₩{fmt(d.amount)}</span>
            <button onClick={() => del(d._row)} style={{ ...btnStyle("#7F1D1D"), padding: "3px 8px", fontSize: 9 }}>삭제</button>
          </div>
        </div>
      ))}
    </div>
  );
}

// ════════════════════════════════════════════════════════════════
//  은퇴 시뮬레이터
// ════════════════════════════════════════════════════════════════
function Simulator({ t, data, totalValue, apiUrl, runAction, showToast }) {
  const config = data.config || {};
  const [currentAge, setCurrentAge] = useState(Number(config.current_age) || 45);
  const [targetAge, setTargetAge] = useState(Number(config.target_age) || 55);
  const [expectedReturn, setExpectedReturn] = useState(Number(config.expected_return) || 5);
  const [saving, setSaving] = useState(false);

  const years = Math.max(1, targetAge - currentAge);
  const clampedYears = Math.min(years, 10);

  const scenarios = [
    { label: "보수적", rate: 3, color: "#60A5FA" },
    { label: "중립", rate: expectedReturn, color: "#34D399" },
    { label: "적극적", rate: 8, color: "#F59E0B" },
  ];

  const calcFV = (rate) => totalValue * Math.pow(1 + rate / 100, clampedYears);

  const chartData = Array.from({ length: clampedYears + 1 }, (_, i) => {
    const row = { year: i === 0 ? "현재" : `${i}년` };
    scenarios.forEach(s => { row[s.label] = Math.round(totalValue * Math.pow(1 + s.rate / 100, i)); });
    return row;
  });

  const saveConfig = async (key, value) => {
    setSaving(true);
    try {
      await postAction(apiUrl, "updateConfig", { key, value });
      showToast("설정 저장됨");
    } catch (e) {
      showToast(e.message, "error");
    }
    setSaving(false);
  };

  return (
    <div style={{ padding: 16 }}>
      <div style={{ background: t.card, borderRadius: 12, padding: 16, marginBottom: 14, border: `1px solid ${t.border}` }}>
        <div style={{ fontSize: 12, color: t.textSub, fontWeight: 600, marginBottom: 12 }}>시뮬레이터 설정</div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
          <div>
            <div style={{ fontSize: 10, color: t.textMuted, marginBottom: 4 }}>현재 나이</div>
            <input type="number" value={currentAge} onChange={e => setCurrentAge(+e.target.value)}
              onBlur={() => saveConfig("current_age", currentAge)}
              style={{ ...inputStyle(t), textAlign: "center" }} />
          </div>
          <div>
            <div style={{ fontSize: 10, color: t.textMuted, marginBottom: 4 }}>목표 은퇴 나이</div>
            <input type="number" value={targetAge} onChange={e => setTargetAge(Math.min(+e.target.value, currentAge + 10))}
              onBlur={() => saveConfig("target_age", targetAge)}
              style={{ ...inputStyle(t), textAlign: "center" }} />
          </div>
        </div>
        <div style={{ marginTop: 12 }}>
          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 10, color: t.textMuted, marginBottom: 4 }}>
            <span>기대 수익률 (중립 시나리오)</span>
            <span style={{ color: "#34D399", fontWeight: 700 }}>{expectedReturn}%</span>
          </div>
          <input type="range" min={1} max={15} step={0.5} value={expectedReturn}
            onChange={e => setExpectedReturn(+e.target.value)}
            onMouseUp={() => saveConfig("expected_return", expectedReturn)}
            onTouchEnd={() => saveConfig("expected_return", expectedReturn)}
            style={{ width: "100%", accentColor: "#34D399" }} />
        </div>
        <div style={{ marginTop: 10, padding: "8px 10px", background: t.inputBg, borderRadius: 8, fontSize: 11, color: t.textSub }}>
          시뮬레이션 기간: <span style={{ color: "#60A5FA", fontWeight: 700 }}>{clampedYears}년</span> (최대 10년 적용)
          {saving && <span style={{ marginLeft: 8, color: t.textFaint }}>· 저장 중...</span>}
        </div>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 14 }}>
        {scenarios.map(s => (
          <div key={s.label} style={{ background: t.card, borderRadius: 12, padding: 12, border: `1px solid ${s.color}30`, textAlign: "center" }}>
            <div style={{ fontSize: 10, color: s.color, fontWeight: 700, marginBottom: 4 }}>{s.label} {s.rate}%</div>
            <div style={{ fontSize: 13, fontWeight: 800, color: t.text }}>₩{fmtM(calcFV(s.rate))}</div>
            <div style={{ fontSize: 9, color: t.textFaint, marginTop: 2 }}>{clampedYears}년 후</div>
          </div>
        ))}
      </div>

      <div style={{ background: t.card, borderRadius: 12, padding: 14, border: `1px solid ${t.border}` }}>
        <div style={{ fontSize: 12, color: t.textSub, fontWeight: 600, marginBottom: 12 }}>복리 성장 시나리오 비교</div>
        <SimpleLineChart
          data={chartData}
          lines={scenarios.map(s => ({ key: s.label, label: s.label, color: s.color }))}
          height={200}
          formatY={v => `₩${fmt(v)}`}
          t={t}
          showLegend={true}
        />
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════════
//  공통 컴포넌트 & 스타일

    <div>

      <div style={{ fontSize: 12, fontWeight: 700, color: color || t.text }}>{value}</div>

  width: "100%", background: t.inputBg, border: `1px solid ${t.border}`,

  outline: "none", boxSizing: "border-box",

const btnStyle = (bg) => ({

const iconBtnStyle = (t) => ({

  display: "flex", alignItems: "center", justifyContent: "center",
});

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
